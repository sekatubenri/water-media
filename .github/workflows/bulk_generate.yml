name: Bulk Generate Articles

on:
  workflow_dispatch:
    inputs:
      count:
        description: '生成する記事数'
        required: true
        default: '30'

permissions:
  contents: write

jobs:
  bulk-generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: generator

      - name: Bulk generate articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          for i in $(seq 1 ${{ github.event.inputs.count }}); do
            echo "=== 記事 $i/${{ github.event.inputs.count }} 生成中 ==="
            node generator/generate.js || echo "スキップ"
            sleep 3
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          git diff --staged --quiet || git commit -m "Bulk generate articles"
          git push
